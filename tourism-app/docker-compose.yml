version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: tourism_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tourism_net

  backend:
    build: ./backend
    container_name: tourism_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - tourism_net

  frontend:
    build: ./frontend
    container_name: tourism_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tourism_net

volumes:
  redis_data:

networks:
  tourism_net:
    driver: bridge
