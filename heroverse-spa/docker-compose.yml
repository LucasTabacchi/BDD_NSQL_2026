services:
  mongo:
    image: mongo:7
    container_name: heroverse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: heroverse

  api:
    build: ./backend
    container_name: heroverse-api
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/heroverse
      PORT: 3000
      CORS_ORIGIN: http://localhost:8081

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: heroverse-frontend
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  mongo_data:
